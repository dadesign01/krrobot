<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KRR 관리자 로그인</title>
		<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script src="supabase-config.js"></script>
		<link rel="icon" href="../img/main/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="16x16" href="../img/main/favicon-16x16.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="../img/main/favicon-32x32.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="../img/main/apple-touch-icon.png" />
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			:root {
				--bg: #0a0a0a;
				--surface: #141414;
				--border: #232323;
				--accent: #e8193c;
				--accent2: #ff4d6d;
				--text: #f0f0f0;
				--muted: #5a5a5a;
				--error: #ff5f5f;
			}
			body {
				font-family: 'Noto Sans KR', sans-serif;
				background: var(--bg);
				color: var(--text);
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
				position: relative;
			}
			body::before {
				content: '';
				position: fixed;
				inset: 0;
				background: radial-gradient(ellipse 60% 50% at 20% 50%, rgba(232, 25, 60, 0.06) 0%, transparent 70%), radial-gradient(ellipse 40% 60% at 80% 50%, rgba(232, 25, 60, 0.04) 0%, transparent 70%);
				pointer-events: none;
			}
			/* 그리드 배경 */
			body::after {
				content: '';
				position: fixed;
				inset: 0;
				background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
				background-size: 48px 48px;
				pointer-events: none;
			}
			.wrap {
				width: 100%;
				max-width: 420px;
				padding: 24px;
				animation: up 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
			}
			@keyframes up {
				from {
					opacity: 0;
					transform: translateY(24px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
			.brand {
				display: flex;
				align-items: center;
				gap: 12px;
				margin-bottom: 44px;
			}
			.brand-logo {
				font-family: 'DM Mono', monospace;
				font-size: 22px;
				font-weight: 500;
				color: var(--accent);
				letter-spacing: 2px;
			}
			.brand-sep {
				width: 1px;
				height: 28px;
				background: var(--border);
			}
			.brand-sub {
				font-size: 12px;
				color: var(--muted);
				letter-spacing: 1px;
			}
			.card {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 16px;
				padding: 40px;
			}
			.card-head {
				margin-bottom: 32px;
			}
			.card-head h1 {
				font-size: 20px;
				font-weight: 700;
				margin-bottom: 6px;
			}
			.card-head p {
				font-size: 13px;
				color: var(--muted);
			}
			.field {
				margin-bottom: 18px;
			}
			label {
				display: block;
				font-size: 11px;
				font-weight: 500;
				letter-spacing: 1.5px;
				text-transform: uppercase;
				color: var(--muted);
				margin-bottom: 8px;
			}
			input {
				width: 100%;
				background: var(--bg);
				border: 1px solid var(--border);
				border-radius: 10px;
				padding: 13px 16px;
				font-family: inherit;
				font-size: 14px;
				color: var(--text);
				outline: none;
				transition: border-color 0.2s;
			}
			input:focus {
				border-color: var(--accent);
			}
			input[type='password'] {
				letter-spacing: 3px;
				font-family: 'DM Mono', monospace;
			}
			.err {
				font-size: 12px;
				color: var(--error);
				margin-top: 6px;
				display: none;
			}
			.err.show {
				display: block;
			}
			.btn {
				width: 100%;
				margin-top: 8px;
				padding: 14px;
				background: var(--accent);
				color: #fff;
				border: none;
				border-radius: 10px;
				font-family: inherit;
				font-size: 14px;
				font-weight: 700;
				cursor: pointer;
				transition:
					opacity 0.2s,
					transform 0.1s;
				letter-spacing: 0.5px;
			}
			.btn:hover {
				opacity: 0.88;
			}
			.btn:active {
				transform: scale(0.98);
			}
			.btn:disabled {
				opacity: 0.35;
				cursor: not-allowed;
			}
			.note {
				margin-top: 20px;
				font-size: 12px;
				color: var(--muted);
				text-align: center;
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<div class="brand">
				<img src="../img/main/logo-wh.png" alt="KRR" style="height: 28px; width: auto" />
				<div class="brand-sep"></div>
				<span class="brand-sub">ADMIN PANEL</span>
			</div>
			<div class="card">
				<div class="card-head">
					<h1>관리자 로그인</h1>
					<p>케이대응로봇 게시판 관리 시스템</p>
				</div>
				<div class="field">
					<label>이메일</label>
					<input type="email" id="email" placeholder="admin@krrobot.co.kr" />
				</div>
				<div class="field">
					<label>비밀번호</label>
					<input type="password" id="password" placeholder="••••••••" />
					<div class="err" id="err">이메일 또는 비밀번호가 올바르지 않습니다</div>
				</div>
				<button class="btn" id="btn" onclick="login()">로그인</button>
			</div>
			<div class="note">관리자 전용 페이지입니다</div>
		</div>

		<script>
			// 이미 로그인 상태면 대시보드로
			sb.auth.getSession().then(({ data }) => {
				if (data.session) location.href = 'dashboard.html';
			});

			document.getElementById('password').addEventListener('keydown', e => {
				if (e.key === 'Enter') login();
			});

			async function login() {
				const email = document.getElementById('email').value.trim();
				const password = document.getElementById('password').value;
				const btn = document.getElementById('btn');
				const err = document.getElementById('err');

				if (!email || !password) return;
				btn.disabled = true;
				btn.textContent = '로그인 중...';
				err.classList.remove('show');

				const { error } = await sb.auth.signInWithPassword({ email, password });

				if (error) {
					err.classList.add('show');
					btn.disabled = false;
					btn.textContent = '로그인';
				} else {
					location.href = 'dashboard.html';
				}
			}
		</script>
	</body>
</html>
