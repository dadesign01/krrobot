<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Technology R&D | KRR 케이대응로봇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/sub.css" />
  <link rel="icon" href="../../img/main/favicon.ico" sizes="any" />
  <script src="../../js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<site-header active="rd"></site-header>

<section class="sub-header sub-header--rnd">
  <div class="sub-header-inner">
    <div class="sub-header-content">
      <span class="sub-badge">R&amp;D</span>
      <h1 class="sub-title">Future Technology R&amp;D</h1>
      <p class="sub-desc">케이대응로봇의 끝없는 도전, 프로젝트 진행 현황입니다.</p>
    </div>
    <div class="sub-location">
      <div class="sub-location-wrap">
        <select onchange="if(this.value) location.href=this.value">
          <option value="future.html">Future Technology R&amp;D</option>
          <option value="cert.html">특허 및 인증</option>
        </select>
        <span class="sub-location-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M9 13L13 7L5 7L9 13Z" fill="#121212"/></svg>
        </span>
      </div>
    </div>
  </div>
</section>

<main class="sub-content">
  <div class="sub-container">

    <div class="content-topbar">
      <p class="content-count">전체 <strong id="total-count">0</strong> 건</p>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="검색어를 입력하세요" />
        <button onclick="doSearch()">검색</button>
      </div>
    </div>

    <div class="rd-grid" id="post-list"></div>
    <div class="pagination" id="pagination"></div>

  </div>
</main>

<site-footer></site-footer>

<script src="../../js/main.js"></script>
<script src="../../js/sb.js"></script>
<script>
const PER_PAGE = 9
let curPage = 1
let totalCount = 0
let searchQ = ''

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch()
})

function doSearch() {
  searchQ = document.getElementById('search-input').value.trim()
  curPage = 1
  loadPosts()
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

async function loadPosts() {
  const grid = document.getElementById('post-list')
  grid.innerHTML = '<p class="loading-msg" style="grid-column:1/-1">불러오는 중...</p>'

  let q = sb.from('rd_posts').select('*', { count: 'exact' }).eq('is_published', true)
  if (searchQ) q = q.ilike('title', `%${searchQ}%`)

  const from = (curPage - 1) * PER_PAGE
  const { data, count, error } = await q
    .order('created_at', { ascending: false })
    .range(from, from + PER_PAGE - 1)

  if (error) { grid.innerHTML = '<p class="empty-msg" style="grid-column:1/-1">데이터를 불러오지 못했습니다.</p>'; return }

  totalCount = count || 0
  document.getElementById('total-count').textContent = totalCount

  if (!data.length) { grid.innerHTML = '<p class="empty-msg" style="grid-column:1/-1">등록된 기술이 없습니다.</p>'; renderPagination(); return }

  grid.innerHTML = data.map(r => {
    const imgHtml = r.image_url
      ? `<img class="rd-card-img" src="${r.image_url}" alt="${esc(r.title)}" loading="lazy" />`
      : `<div class="rd-card-img rd-card-img-empty"><i class="fa-solid fa-flask"></i></div>`
    const badge = r.is_developing ? '<span class="rd-dev-badge">개발중</span>' : ''

    return `
    <div class="rd-card" onclick="openDetail(${r.id})">
      <div class="rd-card-img-wrap">
        ${imgHtml}
        ${badge}
      </div>
      <div class="rd-card-footer">
        <span class="rd-card-title">${esc(r.title)}</span>
        <img class="rd-card-arrow" src="../../img/sub/bg_arrow.png" alt="" />
      </div>
    </div>`
  }).join('')

  renderPagination()
}

function openDetail(id) {
  location.href = `future-detail.html?id=${id}`
}

const SVG_PREV = `<svg xmlns="http://www.w3.org/2000/svg" width="12" height="24" viewBox="0 0 8 16" fill="none" style="transform:scaleX(-1)"><path d="M1.63466 4.38666L2.34199 3.67999L6.19466 7.53133C6.25676 7.59304 6.30605 7.66642 6.33968 7.74726C6.37331 7.82809 6.39063 7.91478 6.39063 8.00233C6.39063 8.08988 6.37331 8.17656 6.33968 8.2574C6.30605 8.33823 6.25676 8.41161 6.19466 8.47333L2.34199 12.3267L1.63532 11.62L5.25132 8.00333L1.63466 4.38666Z" fill="#7B7B7B"/></svg>`
const SVG_NEXT = `<svg xmlns="http://www.w3.org/2000/svg" width="12" height="24" viewBox="0 0 8 16" fill="none"><path d="M1.63466 4.38666L2.34199 3.67999L6.19466 7.53133C6.25676 7.59304 6.30605 7.66642 6.33968 7.74726C6.37331 7.82809 6.39063 7.91478 6.39063 8.00233C6.39063 8.08988 6.37331 8.17656 6.33968 8.2574C6.30605 8.33823 6.25676 8.41161 6.19466 8.47333L2.34199 12.3267L1.63532 11.62L5.25132 8.00333L1.63466 4.38666Z" fill="#7B7B7B"/></svg>`

function renderPagination() {
  const totalPages = Math.ceil(totalCount / PER_PAGE)
  const pg = document.getElementById('pagination')
  if (totalPages <= 1) { pg.innerHTML = ''; return }

  let h = `<button class="pg-btn" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>${SVG_PREV}</button>`
  for (let i = 1; i <= totalPages; i++) h += `<button class="pg-btn${i===curPage?' active':''}" onclick="goPage(${i})">${i}</button>`
  h += `<button class="pg-btn" onclick="goPage(${curPage+1})" ${curPage===totalPages?'disabled':''}>${SVG_NEXT}</button>`
  pg.innerHTML = h
}

function goPage(p) {
  curPage = p
  window.scrollTo({ top: 0, behavior: 'smooth' })
  loadPosts()
}

loadPosts()
</script>
</body>
</html>
