<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>특허 및 인증 | KRR 케이대응로봇</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
		<link rel="stylesheet" href="../../css/style.css" />
		<link rel="stylesheet" href="../../css/sub.css" />
		<link rel="stylesheet" href="../../css/cert.css" />
		<link rel="icon" href="../../img/main/favicon.ico" sizes="any" />
		<script src="../../js/components.js"></script>
	</head>
	<body>
		<site-header active="rd"></site-header>

		<section class="sub-header sub-header--cert">
			<div class="sub-header-inner">
				<div class="sub-header-content">
					<span class="sub-badge">R&amp;D</span>
					<h1 class="sub-title">특허 및 인증</h1>
					<p class="sub-desc">케이대응로봇의 신뢰를 확보한 기술, 다양한 특허와 인증을 소개합니다.</p>
				</div>
				<div class="sub-location">
					<div class="sub-nav">
						<div class="sub-nav-head">
							<span>특허 및 인증</span>
							<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M9 13L13 7L5 7L9 13Z" fill="#121212"/></svg>
						</div>
						<ul class="sub-nav-links">
							<li><a href="future.html">Future Technology R&amp;D</a></li>
						</ul>
					</div>
				</div>
			</div>
		</section>

		<main class="sub-content">
			<div class="sub-container">
				<!-- 섹션 타이틀 -->
				<div class="cert-section-wrap">
					<div class="cert-proven-bg">
						<img src="../../img/sub/Proven.png" alt="" class="proven-img" />
						<h2 class="cert-section-title"><span class="txt-main">특허와 인증</span><span class="txt-normal">으로 검증된 대응 기술</span></h2>
					</div>
				</div>

				<!-- 인증서 그리드 -->
				<div class="cert-grid" id="cert-grid"></div>

				<!-- 페이지네이션 -->
				<nav class="cert-pagination" id="cert-pagination" aria-label="페이지네이션"></nav>
			</div>
		</main>

		<site-footer></site-footer>
<site-top-btn></site-top-btn>

		<script src="../../js/main.js"></script>
		<script>
			(function () {
				const certs = [
					{ img: '../../img/sub/10-1926501.png', title: '방수압조절카트리지가 구비된\n소방용 방수총' },
					{ img: '../../img/sub/10-1926509.png', title: '소방호스 감압변과\n결합되는 방수압조절카트리지' },
					{ img: '../../img/sub/10-1926530.png', title: '방수압조절카트리지용\n방수압조절노블' },
					{ img: '../../img/sub/10-1967838.png', title: '2-채널 방향 조작\n소방용 방수총 거치대' },
					{ img: '../../img/sub/10-1967839.png', title: '원터치 2-채널 방향 조작\n소방용 방수총 거치대' },
					{ img: '../../img/sub/10-2128802.png', title: '소방드론' },
					{ img: '../../img/sub/10-2134913.png', title: '소방용 방수총\n안전 차단장치' },
					{ img: '../../img/sub/10-2557842.png', title: '고층화재 진압용\n소방용수 이동통로 수단' },
					{ img: '../../img/sub/10-2557843.png', title: '소방드론에 적용되는 반발 에너지 분배를\n이용한 호버링 안전 수단' },
					{ img: '../../img/sub/10-2557844.png', title: '소방드론에 적용되는 역추진을\n이용한 호버링 안전 수단' },
					{ img: '../../img/sub/10-2641945.png', title: '소방헬기를 이용한\n화재 공중 진화 장치' },
					{ img: '../../img/sub/10-2651919.png', title: '스마트 방수총을 활용한\n물류 창고 화재 진압 시스템' },
					{ img: '../../img/sub/10-2779420.png', title: '휴대 가능한 모듈식\n방수포 시스템' },
					{ img: '../../img/sub/10-2806321_02.png', title: '2-채널 축방향 회전 발포가\n가능한 일체형 방수총' },
					{ img: '../../img/sub/30-1161052.png', title: '소방용 관창\n(디자인 등록)' },
					{ img: '../../img/sub/30-1161053.png', title: '소방용 관창\n(디자인 등록)' },
					{ img: '../../img/sub/30-1161054.png', title: '소방용 관창\n(디자인 등록)' },
					{ img: '../../img/sub/russia.png', title: '러시아 특허증' },
					{ img: '../../img/sub/usa.png', title: '미국 특허증' },
					{ img: '../../img/sub/japan.png', title: '일본 특허증' },
					{ img: '../../img/sub/china.png', title: '중국 전자 특허증' },
				];

				const COLS = 4;
				const ROWS = 3;
				const PER_PAGE = COLS * ROWS; /* 12 */

				const grid = document.getElementById('cert-grid');
				const pagination = document.getElementById('cert-pagination');
				let currentPage = 1;
				const totalPages = Math.ceil(certs.length / PER_PAGE);

				function renderPage(page) {
					const start = (page - 1) * PER_PAGE;
					const items = certs.slice(start, start + PER_PAGE);

					grid.innerHTML = items
						.map(function (c) {
							return (
								'<div class="cert-card">' +
								'<div class="cert-card-img-wrap">' +
								'<div class="cert-img-inner">' +
								'<img src="' +
								c.img +
								'" alt="' +
								c.title.replace(/\n/g, ' ') +
								'" loading="lazy" />' +
								'</div>' +
								'</div>' +
								'<p class="cert-card-title">' +
								c.title.replace(/\n/g, '<br>') +
								'</p>' +
								'</div>'
							);
						})
						.join('');

					renderPagination(page);
					window.scrollTo({ top: grid.offsetTop - 120, behavior: 'smooth' });
				}

				function renderPagination(page) {
					pagination.innerHTML = '';

					/* 이전 버튼 */
					var prev = document.createElement('button');
					prev.className = 'arrow';
					prev.innerHTML = '&#8249;';
					prev.setAttribute('aria-label', '이전 페이지');
					prev.disabled = page === 1;
					prev.addEventListener('click', function () {
						if (currentPage > 1) {
							currentPage--;
							renderPage(currentPage);
						}
					});
					pagination.appendChild(prev);

					/* 숫자 버튼 */
					for (var i = 1; i <= totalPages; i++) {
						(function (p) {
							var btn = document.createElement('button');
							btn.textContent = p;
							if (p === page) btn.classList.add('active');
							btn.setAttribute('aria-label', p + '페이지');
							btn.addEventListener('click', function () {
								currentPage = p;
								renderPage(currentPage);
							});
							pagination.appendChild(btn);
						})(i);
					}

					/* 다음 버튼 */
					var next = document.createElement('button');
					next.className = 'arrow';
					next.innerHTML = '&#8250;';
					next.setAttribute('aria-label', '다음 페이지');
					next.disabled = page === totalPages;
					next.addEventListener('click', function () {
						if (currentPage < totalPages) {
							currentPage++;
							renderPage(currentPage);
						}
					});
					pagination.appendChild(next);
				}

				renderPage(1);
			})();
		</script>
	</body>
</html>
