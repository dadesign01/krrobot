<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRESS | KRR 케이대응로봇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/sub.css" />
  <link rel="icon" href="../../img/main/favicon.ico" sizes="any" />
  <script src="../../js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<site-header active="news"></site-header>

<section class="sub-header sub-header--press">
  <div class="sub-header-inner">
    <div class="sub-header-content">
      <span class="sub-badge">News</span>
      <h1 class="sub-title">PRESS</h1>
      <p class="sub-desc">케이대응로봇의 보도자료와 미디어입니다.</p>
    </div>
    <div class="sub-location">
      <div class="sub-nav">
        <div class="sub-nav-head">
          <span>PRESS</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M9 13L13 7L5 7L9 13Z" fill="#121212"/></svg>
        </div>
        <ul class="sub-nav-links">
          <li><a href="ir.html">IR 공시정보</a></li>
          <li><a href="jobs.html">채용</a></li>
        </ul>
      </div>
    </div>
  </div>
</section>

<main class="sub-content">
  <div class="sub-container">

    <div class="press-topbar">
      <div class="press-tabs" id="press-tabs">
        <button class="press-tab active" onclick="setTab(this,'all')">전체</button>
        <button class="press-tab" onclick="setTab(this,'press')">보도자료</button>
        <button class="press-tab" onclick="setTab(this,'media')">미디어</button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="검색어를 입력하세요" />
        <button onclick="doSearch()">검색</button>
      </div>
    </div>

    <div class="press-list" id="post-list">
      <p class="loading-msg">불러오는 중...</p>
    </div>

    <div class="pagination" id="pagination"></div>

  </div>
</main>

<site-footer></site-footer>

<script src="../../js/main.js"></script>
<script src="../../js/sb.js"></script>
<script>
const PER_PAGE = 8
let curPage = 1
let totalCount = 0
let curType = 'all'
let searchQ = ''

const SVG_PREV = `<svg xmlns="http://www.w3.org/2000/svg" width="12" height="24" viewBox="0 0 8 16" fill="none" style="transform:scaleX(-1)"><path d="M1.63466 4.38666L2.34199 3.67999L6.19466 7.53133C6.25676 7.59304 6.30605 7.66642 6.33968 7.74726C6.37331 7.82809 6.39063 7.91478 6.39063 8.00233C6.39063 8.08988 6.37331 8.17656 6.33968 8.2574C6.30605 8.33823 6.25676 8.41161 6.19466 8.47333L2.34199 12.3267L1.63532 11.62L5.25132 8.00333L1.63466 4.38666Z" fill="#7B7B7B"/></svg>`
const SVG_NEXT = `<svg xmlns="http://www.w3.org/2000/svg" width="12" height="24" viewBox="0 0 8 16" fill="none"><path d="M1.63466 4.38666L2.34199 3.67999L6.19466 7.53133C6.25676 7.59304 6.30605 7.66642 6.33968 7.74726C6.37331 7.82809 6.39063 7.91478 6.39063 8.00233C6.39063 8.08988 6.37331 8.17656 6.33968 8.2574C6.30605 8.33823 6.25676 8.41161 6.19466 8.47333L2.34199 12.3267L1.63532 11.62L5.25132 8.00333L1.63466 4.38666Z" fill="#7B7B7B"/></svg>`

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch()
})

function setTab(el, type) {
  document.querySelectorAll('.press-tab').forEach(t => t.classList.remove('active'))
  el.classList.add('active')
  curType = type
  curPage = 1
  loadPosts()
}

function doSearch() {
  searchQ = document.getElementById('search-input').value.trim()
  curPage = 1
  loadPosts()
}

function fmtDate(str) {
  if (!str) return ''
  const d = new Date(str)
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
}

function stripHtml(html) {
  const tmp = document.createElement('div')
  tmp.innerHTML = html || ''
  return tmp.textContent || ''
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

async function loadPosts() {
  const list = document.getElementById('post-list')
  list.innerHTML = '<p class="loading-msg">불러오는 중...</p>'

  let q = sb.from('press_posts').select('*', { count: 'exact' }).eq('is_published', true)
  if (curType !== 'all') q = q.eq('type', curType)
  if (searchQ) q = q.ilike('title', `%${searchQ}%`)

  const from = (curPage - 1) * PER_PAGE
  const { data, count, error } = await q
    .order('created_at', { ascending: false })
    .range(from, from + PER_PAGE - 1)

  if (error) { list.innerHTML = '<p class="empty-msg">데이터를 불러오지 못했습니다.</p>'; return }

  totalCount = count || 0
  if (!data.length) { list.innerHTML = '<p class="empty-msg">게시물이 없습니다.</p>'; renderPagination(); return }

  list.innerHTML = data.map(r => {
    const catLabel = r.type === 'media' ? '미디어' : '보도자료'
    const thumbHtml = r.image_url
      ? `<img src="${r.image_url}" alt="${esc(r.title)}" loading="lazy" />`
      : `<div class="press-thumb-empty"><i class="fa-solid fa-newspaper"></i></div>`
    const excerpt = stripHtml(r.summary || r.content || '')

    return `
    <a class="press-card" href="press-detail.html?id=${r.id}">
      <div class="press-thumb">${thumbHtml}</div>
      <div class="press-body">
        <span class="press-cat">${catLabel}</span>
        <div class="press-title">${esc(r.title)}</div>
        <div class="press-excerpt">${esc(excerpt)}</div>
        <div class="press-date">${fmtDate(r.created_at)}</div>
      </div>
      <img class="press-arrow-img" src="../../img/sub/arrow.png" alt="" />
    </a>`
  }).join('')

  renderPagination()
}

function renderPagination() {
  const totalPages = Math.ceil(totalCount / PER_PAGE)
  const pg = document.getElementById('pagination')
  if (totalPages <= 1) { pg.innerHTML = ''; return }

  let h = `<button class="pg-btn" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>${SVG_PREV}</button>`
  for (let i = 1; i <= totalPages; i++) h += `<button class="pg-btn${i===curPage?' active':''}" onclick="goPage(${i})">${i}</button>`
  h += `<button class="pg-btn" onclick="goPage(${curPage+1})" ${curPage===totalPages?'disabled':''}>${SVG_NEXT}</button>`
  pg.innerHTML = h
}

function goPage(p) {
  curPage = p
  window.scrollTo({ top: 0, behavior: 'smooth' })
  loadPosts()
}

loadPosts()
</script>
</body>
</html>
